<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma de Pagamento - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-glass: rgba(30, 41, 59, 0.45);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent: #06b6d4;
            --accent-hover: #0891b2;
            --accent-glow: rgba(6, 182, 212, 0.15);
            
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            
            --font-outfit: 'Outfit', sans-serif;
            --font-inter: 'Inter', sans-serif;
            
            --shadow-premium: 0 20px 40px -15px rgba(0, 0, 0, 0.7), 0 1px 3px rgba(255, 255, 255, 0.05) inset;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-inter);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e152a 0%, #09090b 100%);
            color: var(--text-primary);
            overflow: hidden;
        }

        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--shadow-premium);
            width: 90vw;
            max-width: 580px;
            text-align: center;
            position: relative;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        h2 {
            font-family: var(--font-outfit);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Order Summary Card */
        .summary-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-total {
            font-family: var(--font-outfit);
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--success);
            text-shadow: 0 0 12px var(--success-glow);
        }

        /* Payments Grid Layout */
        .payment-options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 18px;
            padding: 22px 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .payment-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px -8px var(--accent-glow);
        }

        .payment-card svg {
            color: var(--accent);
            transition: var(--transition);
        }

        .payment-card:hover svg {
            transform: scale(1.1);
        }

        .payment-card span {
            font-family: var(--font-outfit);
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Back Button */
        .back-btn {
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }

        /* Processing Backdrop Loader Overlay */
        .processing-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(9, 9, 11, 0.92);
            backdrop-filter: blur(16px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .processing-dialog {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            text-align: center;
            max-width: 350px;
            padding: 30px;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(6, 182, 212, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .processing-text h3 {
            font-family: var(--font-outfit);
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .processing-text p {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="2" y1="10" x2="22" y2="10"></line>
            </svg>
        </div>
        
        <h2>Checkout Seguro</h2>
        <p class="subtitle">Selecione o seu método de pagamento preferido</p>
        
        <div class="summary-card">
            <span class="summary-label">Total do Pedido</span>
            <span class="summary-total" id="order-total">R$ 0,00</span>
        </div>
        
        <div class="payment-options-grid">
            <div class="payment-card" onclick="Pix()">
                <!-- Official PIX SVG contour -->
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.002 2.001c-.13 0-.258.049-.356.147L2.146 11.646a.502.502 0 0 0 0 .708l9.5 9.5c.098.098.226.147.356.147.13 0 .258-.049.356-.147l9.5-9.5a.502.502 0 0 0 0-.708l-9.5-9.5a.502.502 0 0 0-.356-.147zm.001 2.207l7.293 7.293-7.293 7.293-7.293-7.293 7.293-7.293zm0 3.394l-3.899 3.9 3.899 3.899 3.899-3.899-3.899-3.9z"/>
                </svg>
                <span>PIX</span>
            </div>
            
            <div class="payment-card" onclick="processCardPayment('Crédito')">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <span>Crédito</span>
            </div>
            
            <div class="payment-card" onclick="processCardPayment('Débito')">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                    <line x1="1" y1="10" x2="23" y2="10"></line>
                </svg>
                <span>Débito</span>
            </div>
            
            <div class="payment-card" onclick="processCardPayment('Alimentação')">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <span>Alimentação</span>
            </div>
        </div>
        
        <button class="back-btn" onclick="backToPDV()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>Voltar ao PDV</span>
        </button>
    </div>

    <!-- Processing Backdrop Overlay -->
    <div class="processing-backdrop" id="payment-loader">
        <div class="processing-dialog">
            <div class="spinner"></div>
            <div class="processing-text">
                <h3 id="loader-title">Processando...</h3>
                <p id="loader-desc">Por favor, insira ou aproxime o cartão do terminal.</p>
            </div>
        </div>
    </div>

    <script>
        // Fetch accurate total amount from cart API
        async function fetchOrderTotal() {
            try {
                const res = await fetch("/api/cart");
                if (res.ok) {
                    const data = await res.json();
                    const sub = data.total;
                    const tax = Math.round(sub * 0.0825 * 100) / 100;
                    const tot = Math.round((sub + tax) * 100) / 100;
                    document.getElementById("order-total").innerText = `R$ ${tot.toFixed(2).replace('.', ',')}`;
                }
            } catch (err) {
                console.error("Error loading order total:", err);
            }
        }

        fetchOrderTotal();

        function Pix() {
            window.location.href = "/PixRoute";
        }
        function backToPDV() {
            window.location.href = "/";
        }

        function showProcessingLoader(method) {
            const loader = document.getElementById("payment-loader");
            const title = document.getElementById("loader-title");
            const desc = document.getElementById("loader-desc");
            
            title.innerText = `Pagamento no ${method}`;
            desc.innerText = "Por favor, insira ou aproxime o cartão do terminal de autoatendimento.";
            
            loader.style.display = "flex";
            
            // Switch message after 1.2 seconds for realistic UI sequence
            setTimeout(() => {
                desc.innerText = "Conectando com o banco adquirente... Processando transação.";
            }, 1200);
        }

        async function processCardPayment(method) {
            showProcessingLoader(method);
            
            // Simulate card reading delay and API call
            setTimeout(async () => {
                // 90% approval rate, 10% decline rate
                const isApproved = Math.random() < 0.90;
                
                if (isApproved) {
                    try {
                        const res = await fetch("/api/checkout/card", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ payment_method: method })
                        });
                        
                        if (res.ok) {
                            window.location.href = "/SuccessRoute";
                        } else {
                            window.location.href = "/ErrorRoute";
                        }
                    } catch (err) {
                        window.location.href = "/ErrorRoute";
                    }
                } else {
                    // Simulate decline
                    window.location.href = "/ErrorRoute";
                }
            }, 2500);
        }
    </script>
</body>
</html>
