<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - Pagamento Aprovado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-glass: rgba(16, 185, 129, 0.1);
            --border-glass: rgba(16, 185, 129, 0.2);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --shadow-premium: 0 20px 40px -15px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(255, 255, 255, 0.05) inset;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #064e3b 0%, #09090b 100%);
            color: var(--text-primary);
            padding: 20px;
        }

        .success-box {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 28px;
            box-shadow: var(--shadow-premium);
            padding: 45px 30px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .success-icon-wrapper {
            width: 80px;
            height: 80px;
            background: var(--bg-glass);
            border: 2px solid var(--success);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--success);
            box-shadow: 0 0 30px var(--success-glow);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.1rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.5;
            max-width: 320px;
        }

        .back-button {
            width: 100%;
            max-width: 250px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--success-glow);
            margin-top: 10px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--success-glow);
        }

        .back-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="success-icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Pagamento Aprovado</h1>
        <p>Sua transação foi processada com sucesso e a compra foi registrada!</p>
        <button class="back-button" onclick="window.location.href='/'">Concluir</button>
    </div>
</body>
</html>
