<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Auto-Atendimento - Premium</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- LEFT SIDE: Product Catalog or Manual Barcode Keypad -->
        <div class="left-pane">
            <!-- Navigation Tabs -->
            <div class="kiosk-tabs">
                <button class="kiosk-tab-btn active" id="tab-catalog-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    <span>Touch Catálogo</span>
                </button>
                <button class="kiosk-tab-btn" id="tab-keypad-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                        <line x1="6" y1="8" x2="6" y2="8"></line>
                        <line x1="10" y1="8" x2="10" y2="8"></line>
                        <line x1="14" y1="8" x2="14" y2="8"></line>
                        <line x1="18" y1="8" x2="18" y2="8"></line>
                        <line x1="6" y1="12" x2="6" y2="12"></line>
                        <line x1="10" y1="12" x2="10" y2="12"></line>
                        <line x1="14" y1="12" x2="14" y2="12"></line>
                        <line x1="18" y1="12" x2="18" y2="12"></line>
                        <line x1="7" y1="16" x2="17" y2="16"></line>
                    </svg>
                    <span>Digitar Código (Scanner)</span>
                </button>
            </div>
            
            <!-- PANEL 1: Visual Product Touch Catalog -->
            <div class="tab-content active" id="panel-catalog">
                <div class="catalog-header">
                    <div class="search-box">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="catalog-search" placeholder="Buscar produto por nome ou código...">
                    </div>
                </div>
                
                <!-- Horizontal Category Pills -->
                <div class="categories-bar">
                    <div class="category-pill active" data-category="Todos">Todos</div>
                    <div class="category-pill" data-category="Lanches">Lanches</div>
                    <div class="category-pill" data-category="Bebidas">Bebidas</div>
                    <div class="category-pill" data-category="Sobremesas">Sobremesas</div>
                </div>
                
                <!-- Product grid container -->
                <div class="catalog-grid" id="catalog-grid">
                    <!-- Products injected dynamically by script.js -->
                </div>
            </div>
            
            <!-- PANEL 2: Classic Kiosk Barcode Keypad Terminal -->
            <div class="tab-content" id="panel-keypad">
                <div class="terminal-side">
                    <div class="Screen">
                        <span class="screen-label">Código do Produto (Scanner Simulado)</span>
                        <div class="screen-value" id="terminal-screen"></div>
                    </div>
                    
                    <div class="Keyboard_body">
                        <button class="num-btn" value="1">1</button>
                        <button class="num-btn" value="2">2</button>
                        <button class="num-btn" value="3">3</button>
                        <button class="num-btn" value="4">4</button>
                        <button class="num-btn" value="5">5</button>
                        <button class="num-btn" value="6">6</button>
                        <button class="num-btn" value="7">7</button>
                        <button class="num-btn" value="8">8</button>
                        <button class="num-btn" value="9">9</button>
                        
                        <button class="delete" id="del-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                                <line x1="18" y1="9" x2="12" y2="15"></line>
                                <line x1="12" y1="9" x2="18" y2="15"></line>
                            </svg>
                        </button>
                        <button class="num-btn" value="0">0</button>
                        <button class="confirm" id="confirm-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: Shopping Cart Receipt -->
        <div class="CF">
            <div class="receipt-header">
                <div class="receipt-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span>Carrinho</span>
                </div>
                <div class="receipt-badge" id="item-count">0 itens</div>
            </div>

            <!-- Scrollable receipt list of items -->
            <div class="cart-items-container" id="cart-list">
                <!-- Injected by script.js -->
            </div>

            <!-- Totals & Checkout -->
            <div class="receipt-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">R$ 0,00</span>
                </div>
                <div class="summary-row">
                    <span>Impostos (8.25% municipal)</span>
                    <span id="cart-taxes">R$ 0,00</span>
                </div>
                <div class="summary-row total">
                    <span>Total a Pagar</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
                
                <button class="checkout-btn" id="pay-btn" disabled>
                    <span>PAGAR COMPRA</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- JS Core -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
